<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Premium Messaging</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">N</div>
                    <h1>Nexus</h1>
                </div>
            </div>
            
            <div class="search-bar">
                <input type="text" placeholder="Search conversations...">
            </div>

            <nav class="conversations">
                <div class="section-title">Channels</div>
                <div class="conversation-list" id="conversationList">
                    <div class="conversation-item active">
                        <div class="avatar">G</div>
                        <div class="convo-info">
                            <div class="convo-name">Global Lounge</div>
                            <div class="convo-preview">Active now</div>
                        </div>
                    </div>
                    <div class="conversation-item">
                        <div class="avatar">D</div>
                        <div class="convo-info">
                            <div class="convo-name">Design Sync</div>
                            <div class="convo-preview">3 new messages</div>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="user-profile">
                <div class="avatar" id="userAvatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="userNameDisplay">Anonymous</div>
                    <div class="user-status">Active Now</div>
                </div>
                <button class="settings-btn" title="Settings"><i class="fa-solid fa-gear"></i></button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="chat-info">
                    <h2 id="currentChatName">Global Lounge</h2>
                    <span class="status-indicator">42 members online</span>
                </div>
                <div class="chat-actions">
                    <button class="action-btn" title="Start Call"><i class="fa-solid fa-phone"></i></button>
                    <button class="action-btn" title="Video Chat"><i class="fa-solid fa-video"></i></button>
                    <button class="action-btn" title="Info"><i class="fa-solid fa-circle-info"></i></button>
                </div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="system-message">This is the start of the Global Lounge. Be kind.</div>
            </div>

            <footer class="chat-input-area">
                <button class="attach-btn" title="Attach Files"><i class="fa-solid fa-plus"></i></button>
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Message Global Lounge...">
                    <button class="emoji-btn">😊</button>
                </div>
                <button class="send-btn" id="sendBtn" title="Send Message">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </footer>
        </main>
    </div>

    <!-- Modals -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="logo-icon" style="margin: 0 auto 24px; width: 64px; height: 64px; font-size: 2rem; border-radius: 20px;">N</div>
            <h2>Join the Conversation</h2>
            <p>Nexus is a premium real-time messaging space. Enter your name to enter the lounge.</p>
            <input type="text" id="usernameInput" placeholder="Your display name">
            <button id="loginBtn">Enter Nexus</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
