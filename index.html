<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | NOTHING STYLE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"></div>
                    <h1>Nexus</h1>
                </div>
            </div>
            
            <div class="search-bar">
                <input type="text" placeholder="Search...">
            </div>

            <nav class="conversations">
                <div class="section-title">Channels</div>
                <div class="conversation-list" id="conversationList">
                    <div class="conversation-item active">
                        <div class="avatar">G</div>
                        <div class="convo-info">
                            <div class="convo-name">Global</div>
                            <div class="convo-preview">Live</div>
                        </div>
                    </div>
                    <div class="conversation-item">
                        <div class="avatar">D</div>
                        <div class="convo-info">
                            <div class="convo-name">Design</div>
                            <div class="convo-preview">3 New</div>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="user-profile">
                <div class="avatar" id="userAvatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="userNameDisplay">Anonymous</div>
                    <div class="user-status">Online</div>
                </div>
                <button class="settings-btn" title="Settings"><i class="fa-solid fa-ellipsis"></i></button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="chat-info">
                    <h2 id="currentChatName">Global</h2>
                    <span class="status-indicator">42 Members</span>
                </div>
                <div class="chat-actions">
                    <button class="action-btn"><i class="fa-solid fa-phone"></i></button>
                    <button class="action-btn"><i class="fa-solid fa-video"></i></button>
                    <button class="action-btn"><i class="fa-solid fa-info"></i></button>
                </div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="system-message">Beginning of stream.</div>
            </div>

            <footer class="chat-input-area">
                <button class="attach-btn"><i class="fa-solid fa-plus"></i></button>
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Message...">
                    <button class="emoji-btn"><i class="fa-regular fa-face-smile"></i></button>
                </div>
                <button class="send-btn" id="sendBtn">
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </footer>
        </main>
    </div>

    <!-- Modals -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="logo-icon"></div>
            <h2>Nexus</h2>
            <p>Enter to begin</p>
            <input type="text" id="usernameInput" placeholder="Name">
            <button id="loginBtn">Start</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
